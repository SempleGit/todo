<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <link rel="stylesheet" href="style.css">
  </head> 
  <body>
      <h1 class="main-heading">A Little Better Everyday</h1>
      
      <div class="popout-overlay">
        <div class="popout-form">
          <div data-key="today" class="todo-container">
            <h2 class="todo-header">today</h2>
            <ul data-key="today-ul">
              <li>this thing.</li>
            </ul>
          </div>  
          <button class="close-button">Close</button>
        </div>
      </div>

      <!-- Project Selectors -->
      <div class="tab-container">
        <div class="tab-selector">
          <p data-key="today" class="selector">today</p>
          <p data-key="tomorrow" class="selector selected">tomorrow</p>
          <p id="add-button">Add</p> 
        </div>
      </div>

        <!-- Project items -->
      <div class="project-container">
        <div data-key="Read the book" class="todo-container">
          <h2 class="todo-header">Read the book</h2>
          <ul data-key="today-ul">
            <li>this thing.</li>
          </ul>
        </div>
        
        <div data-key="Read the book2" class="todo-container">
          <h2 class="todo-header">Read the book2</h2>
          <ul data-key="today-ul">
            <li>this thing.</li>
          </ul>
        </div>
      </div>
    
    <script src="main.js"></script>
  </body>
</html>
